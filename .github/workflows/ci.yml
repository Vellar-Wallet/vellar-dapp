name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vela
          POSTGRES_PASSWORD: vela
          POSTGRES_DB: vela
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U vela"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
        env:
          TEST_DATABASE_URL: postgres://vela:vela@localhost:5433/vela

      - name: Build
        run: pnpm build
