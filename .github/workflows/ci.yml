name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vela
          POSTGRES_PASSWORD: vela
          POSTGRES_DB: vela
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U vela"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      # No `version:` here — pnpm/action-setup reads it from the
      # `packageManager` field in package.json (pnpm@11.9.0). Specifying both
      # errors with ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # wallet-sdk's subpath exports (/rpc, /balances) point at built dist, so
      # anything that imports them (e.g. apps/extension) can't typecheck until
      # the SDK is built.
      - name: Build SDK
        run: pnpm --filter @vela/wallet-sdk build

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
        env:
          TEST_DATABASE_URL: postgres://vela:vela@localhost:5433/vela

      - name: Build
        run: pnpm build
